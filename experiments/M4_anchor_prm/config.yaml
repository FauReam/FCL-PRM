# M4: Anchor-PRM with Step Embedding Alignment
# Innovation Point A prototype: align client step embeddings before aggregation.

experiment:
  name: "m4_anchor_prm_alignment"
  milestone: "M4"
  description: "Anchor-PRM: cross-client step embedding alignment"
  seed: 42

model:
  backbone: "EleutherAI/pythia-1.4b"
  prm_head_dim: 256
  freeze_backbone: true

data:
  dataset: "versaprm"
  data_dir: "./data/versaprm"
  domains: ["math", "code", "medical", "general"]
  samples_per_client: 5000
  max_length: 512

federated:
  num_clients: 4
  num_rounds: 100
  local_epochs: 2
  local_batch_size: 32
  local_learning_rate: 1.0e-4
  aggregation: "anchor_prm"
  participation_rate: 1.0

anchor:
  num_anchor_steps: 100
  anchor_selection: "diverse"  # diverse / random / domain-balanced
  alignment_weight: 0.1

training:
  optimizer: "adamw"
  scheduler: "cosine"
  max_grad_norm: 1.0

evaluation:
  eval_every: 5
  eval_split: "val"
  compute_cd_spi: true

logging:
  log_dir: "./experiments/M4_anchor_prm/results/logs"
  checkpoint_dir: "./experiments/M4_anchor_prm/results/checkpoints"
  save_every: 10

hardware:
  device: "cuda"
  num_workers: 0
