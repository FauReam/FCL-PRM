# M2: Centralized PRM Baseline — CPU-friendly scale for testing
# 100 samples/domain, 3 epochs, batch 16

experiment:
  name: "m2_centralized_cpu"
  milestone: "M2"
  description: "Centralized PRM on VersaPRM (CPU, 400 samples total)"
  seed: 42

model:
  backbone: "EleutherAI/pythia-1.4b"
  prm_head_dim: 256
  freeze_backbone: true

data:
  dataset: "versaprm"
  data_dir: "./data/versaprm"
  domains: ["math", "code", "medical", "general"]
  samples_per_domain: 100
  max_length: 128
  val_split: 0.1

training:
  batch_size: 16
  num_epochs: 3
  learning_rate: 1.0e-4
  weight_decay: 0.01
  max_grad_norm: 1.0
  optimizer: "adamw"
  scheduler: "constant"

evaluation:
  eval_every: 50
  eval_batch_size: 32

logging:
  log_dir: "./experiments/M2_centralized_prm/results/logs_cpu"
  checkpoint_dir: "./experiments/M2_centralized_prm/results/checkpoints_cpu"
  save_every: 500

hardware:
  device: "cpu"
  num_workers: 0
