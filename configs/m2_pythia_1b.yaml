# M2: Centralized PRM Baseline — Pythia 1.4B
# Reproduce PRM800K centralized training as the foundation.

experiment:
  name: "m2_centralized_prm_pythia_1b"
  milestone: "M2"
  description: "Centralized PRM training on PRM800K with Pythia 1.4B"
  seed: 42

model:
  backbone: "EleutherAI/pythia-1.4b"
  prm_head_dim: 256
  freeze_backbone: true

data:
  dataset: "prm800k"
  data_dir: "./data/prm800k"
  split: "phase2_train"
  val_split: 0.1
  max_length: 256

training:
  batch_size: 8
  num_epochs: 3
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 500
  max_grad_norm: 1.0
  optimizer: "adamw"
  scheduler: "cosine"

evaluation:
  eval_every: 1000
  eval_batch_size: 16
  metrics: ["accuracy", "f1", "auc"]

logging:
  log_dir: "./experiments/M2_centralized_prm/results/logs"
  checkpoint_dir: "./experiments/M2_centralized_prm/results/checkpoints"
  save_every: 1000
  use_wandb: false

hardware:
  device: "cuda"
  num_workers: 0
