# M6: Step-Level DP-SGD + Privacy Attack Evaluation
# Innovation Point B: client-local step-level DP, plus MIA / gradient
# reconstruction attack baselines under the federated PRM threat model.

experiment:
  name: "m6_dp_privacy_attacks"
  milestone: "M6"
  description: "Step-level DP-SGD with privacy attack evaluation"
  seed: 42

model:
  backbone: "EleutherAI/pythia-1.4b"
  prm_head_dim: 256
  freeze_backbone: true

data:
  dataset: "versaprm"
  data_dir: "./data/versaprm"
  domains: ["math", "code", "medical", "general"]
  samples_per_client: 5000
  max_length: 256

federated:
  num_clients: 4
  num_rounds: 50
  local_epochs: 2
  local_batch_size: 32
  local_learning_rate: 1.0e-4
  aggregation: "anchor_prm"
  participation_rate: 1.0

anchor:
  num_anchor_steps: 100
  anchor_selection: "diverse"
  alignment_weight: 0.1

dp:
  enabled: true
  epsilon: 4.0
  delta: 1.0e-5
  max_grad_norm: 1.0
  num_steps_per_cot: 8

attacks:
  membership_inference:
    enabled: true
    num_member_samples: 200
    num_non_member_samples: 200
  gradient_reconstruction:
    enabled: true
    max_steps: 8
    num_iterations: 1000
    lr: 0.1

training:
  optimizer: "adamw"
  scheduler: "cosine"
  max_grad_norm: 1.0

evaluation:
  eval_every: 5
  eval_split: "val"
  compute_cd_spi: true
  privacy_metrics: ["mia_auc", "reconstruction_auc"]

logging:
  log_dir: "./experiments/M6_privacy/results/logs"
  checkpoint_dir: "./experiments/M6_privacy/results/checkpoints"
  attack_dir: "./experiments/M6_privacy/results/attacks"
  save_every: 10

hardware:
  device: "cuda"
  num_workers: 0
